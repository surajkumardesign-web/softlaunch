<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>You got a card 💌 — softlaunch*</title>
<meta property="og:title" content="Your whole squad made you something 💌">
<meta property="og:description" content="Tap to open. Brace yourself.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF4EA; --ink:#241629; --ink-soft:#4d3a52;
  --rose:#E84D8A; --rose-deep:#8f1f4c; --rose-paper:#FCE3EE;
  --marigold:#F2A93B; --marigold-deep:#7a4c08; --marigold-paper:#FCEDD3;
  --mint:#5BC49A; --mint-deep:#0e4f38; --mint-paper:#DCF3E9;
  --lilac:#B9A7E6; --lilac-paper:#EDE6FA; --lilac-deep:#3f2d6e;
  --coral:#F0997B; --coral-paper:#FAECE7; --coral-deep:#4A1B0C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Instrument Sans',sans-serif;background:#1a0f1e;color:var(--ink);overflow:hidden;position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.3;mix-blend-mode:multiply}
.stage{width:100%;max-width:440px;height:100dvh;max-height:900px;position:relative;overflow:hidden;background:var(--marigold-paper);box-shadow:0 20px 80px rgba(0,0,0,.5);transition:background .4s}
@media (min-width:441px){.stage{border-radius:32px;height:min(900px,calc(100dvh - 40px));margin:20px}}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 30px 96px;text-align:center;opacity:0;pointer-events:none;transition:opacity .45s ease}
.scene.on{opacity:1;pointer-events:auto}
.disp{font-family:'Bricolage Grotesque',sans-serif;line-height:1.12;letter-spacing:-.02em}
.sweet{font-family:'Fraunces',serif;font-style:italic;font-weight:500;letter-spacing:-.01em}
.eyebrow{font-family:'Fraunces',serif;font-style:italic;font-size:16px;margin-bottom:14px;opacity:.85}
.pill{display:inline-block;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;padding:6px 14px;border-radius:999px;margin-bottom:20px;border:2px solid var(--ink)}
.tap-hint{position:absolute;bottom:30px;left:0;right:0;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;opacity:0;pointer-events:none;transition:opacity .4s}
.tap-hint.show{opacity:.55}
.tap-hint span{display:inline-block;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
.dots{position:absolute;top:20px;left:0;right:0;display:flex;gap:4px;justify-content:center;padding:0 28px;z-index:5}
.dot{height:3px;flex:1;background:rgba(36,22,41,.14);border-radius:2px;transition:background .3s}
.dot.done{background:rgba(36,22,41,.55)}
.dot.now{background:var(--ink)}
.cover-card{width:min(290px,78vw);border-radius:20px;border:2px solid var(--ink);background:#fff;box-shadow:8px 8px 0 var(--ink);padding:34px 24px;transform:rotate(-2deg);position:relative;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:rotate(-2deg) translateY(0)}50%{transform:rotate(-2deg) translateY(-6px)}}
.sticker{position:absolute;top:-14px;right:-12px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:12.5px;background:var(--mint);border:2px solid var(--ink);color:var(--ink);padding:8px 14px;border-radius:999px;transform:rotate(9deg)}
.roast-line{font-size:clamp(23px,5.6vw,29px);font-weight:700;line-height:1.26;max-width:340px}
.gopts{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;margin-top:26px}
.gbtn{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;padding:13px 20px;border-radius:999px;border:2px solid var(--ink);background:#fff;cursor:pointer;transition:transform .12s,background .2s}
.gbtn:active{transform:scale(.97)}
.gbtn.right{background:var(--mint)}
.gbtn.wrong{background:#F7C1C1;opacity:.8}
.gbtn:disabled{cursor:default}
.reveal{font-family:'Fraunces',serif;font-style:italic;font-size:17px;margin-top:18px;min-height:24px;opacity:0;transition:opacity .3s}
.reveal.show{opacity:1}
.reactions{display:flex;gap:12px;margin-top:16px;opacity:0;pointer-events:none;transition:opacity .3s}
.reactions.show{opacity:1;pointer-events:auto}
.rbtn{font-size:22px;width:52px;height:52px;border-radius:50%;border:2px solid var(--ink);background:#fff;cursor:pointer;transition:transform .12s}
.rbtn:active{transform:scale(1.25)}
.femo{position:absolute;font-size:22px;pointer-events:none;animation:floatup 1.1s ease-out forwards}
@keyframes floatup{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-130px) scale(1.6);opacity:0}}
.avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:21px;border:2px solid var(--ink);margin-bottom:20px}
.stars{display:flex;gap:5px;margin-top:22px;justify-content:center;flex-wrap:wrap}
.star{width:34px;height:34px;border-radius:50%;background:rgba(36,22,41,.08);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent;transition:all .15s;font-family:'Bricolage Grotesque',sans-serif;font-weight:800}
.star.lit{background:var(--marigold);color:var(--ink);border-color:var(--ink)}
.rating-hint{margin-top:13px;font-size:14px;color:var(--ink-soft);min-height:20px}
.rate-who{margin-top:6px;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:19px}
.verdict-list{width:100%;max-width:310px;margin-top:18px;display:flex;flex-direction:column;gap:9px}
.vrow{display:flex;align-items:center;gap:12px;padding:11px 14px;border:2px solid var(--ink);border-radius:14px;background:#fff}
.vrow.gold{background:var(--marigold-paper)}
.vrow.silver{background:var(--lilac-paper)}
.vrow.bronze{background:var(--coral-paper)}
.vrow .rank{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;width:20px;text-align:center}
.vrow .who{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;flex:1;text-align:left;font-size:15px}
.vrow .sc{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:14.5px;background:rgba(36,22,41,.08);padding:3px 10px;border-radius:999px}
.vrow.gold .sc{background:var(--marigold)}
.gscore{margin-top:16px;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14.5px;background:#fff;border:2px solid var(--ink);border-radius:999px;padding:9px 18px}
.confetti-piece{position:absolute;top:-30px;border-radius:1px;pointer-events:none}
@keyframes fall{0%{transform:translateY(-30px) rotate(0)}100%{transform:translateY(110vh) rotate(720deg)}}
.footer-brand{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:11px;color:var(--ink-soft);opacity:.6;letter-spacing:.06em}
.share-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center}
.btn{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14px;background:var(--ink);color:var(--paper);padding:12px 22px;border-radius:999px;border:2px solid var(--ink);cursor:pointer;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:transparent;color:var(--ink)}
</style>
</head>
<body>
<svg class="grain" aria-hidden="true"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.11"/></feComponentTransfer></filter><rect width="100%" height="100%" filter="url(#n)"/></svg>

<div class="stage" id="stage">
  <div class="dots" id="dots"></div>
  <div id="sceneHost" style="position:absolute;inset:0"></div>
</div>

<script>
const qp = new URLSearchParams(location.search);
const rawName = qp.get('to') || 'Ananya';
const toName = rawName.replace(/[^\p{L}\p{N} .'-]/gu,'').trim().slice(0,20) || 'Ananya';
const pretty = toName.charAt(0).toUpperCase()+toName.slice(1);
document.title = pretty + ', you got a card 💌 — softlaunch*';

const contribs = [
  {n:'Priya', k:'P', c:'var(--marigold)', deep:'var(--marigold-deep)', paper:'var(--marigold-paper)',
   line:'Has never once been on time to anything. Not once. We keep notes.',
   right:'Priya. Obviously. She wrote it while running late.', wrong:'Nope — that was Priya. She was late submitting it too.'},
  {n:'Rohan', k:'R', c:'var(--lilac)', deep:'var(--lilac-deep)', paper:'var(--lilac-paper)',
   line:'Still argues with the Swiggy ETA like it owes them money.',
   right:'Rohan. You know your people.', wrong:'It was Rohan. He argued about this roast\u2019s delivery too.'},
  {n:'Aisha', k:'A', c:'var(--mint)', deep:'var(--mint-deep)', paper:'var(--mint-paper)',
   line:'The mom friend of the group. Congrats on turning 47, yaar.',
   right:'Aisha. Called it.', wrong:'That was Aisha. The mom friend always knows the mom friend.'},
  {n:'Karan', k:'K', c:'var(--coral)', deep:'var(--coral-deep)', paper:'var(--coral-paper)',
   line:'3,000 screenshots and 4 real photos in the camera roll. Get help.',
   right:'Karan. Direct hit.', wrong:'Karan wrote that. He\u2019s seen your phone.'}
];
let guessScore = 0;
const scores = {};

const host = document.getElementById('sceneHost');
const stage = document.getElementById('stage');
const scenes = [];

function addScene(bg, html, opts){
  const d = document.createElement('div');
  d.className = 'scene';
  d.dataset.bg = bg;
  d.innerHTML = html + '<div class="tap-hint"><span>' + ((opts&&opts.hint)||'tap ↓') + '</span></div>';
  d.dataset.ready = (opts&&opts.locked) ? '0' : '1';
  d.dataset.hintdelay = (opts&&opts.hintDelay)||300;
  if(opts&&opts.confetti) d.dataset.confetti = '1';
  host.appendChild(d);
  scenes.push(d);
  return d;
}

addScene('var(--marigold-paper)',
  '<p class="eyebrow" style="color:var(--marigold-deep)">a group card, made just for you</p>'
  +'<div class="cover-card"><span class="sticker">0 mercy</span>'
  +'<p class="disp" style="font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:var(--marigold-deep);margin-bottom:12px">happy birthday</p>'
  +'<p class="disp" style="font-size:clamp(32px,8vw,44px);color:var(--marigold-deep)">'+pretty+'.</p>'
  +'<p style="margin-top:16px;font-size:13.5px;color:var(--ink-soft);font-style:italic">4 friends. 4 roasts. 1 rule:<br>guess who wrote each one.</p></div>',
  {hint:'tap if you dare ↓'});

function guessScene(ci){
  const c = contribs[ci];
  const others = contribs.filter((x,i)=>i!==ci).map(x=>x.n);
  const opts = [c.n, others[Math.floor(Math.random()*others.length)], others.filter(n=>true)[0]===undefined?null:null];
  let pool = [c.n];
  while(pool.length<3){ const r = others[Math.floor(Math.random()*others.length)]; if(!pool.includes(r)) pool.push(r); }
  pool.sort(()=>Math.random()-.5);
  const s = addScene(c.paper,
    '<span class="pill" style="background:'+c.c+';color:var(--ink)">round '+(ci+1)+' of 4 — who said this?</span>'
    +'<p class="disp roast-line" style="color:'+c.deep+'">'+c.line+'</p>'
    +'<div class="gopts">'+pool.map(n=>'<button class="gbtn" data-n="'+n+'">'+n+'</button>').join('')+'</div>'
    +'<p class="reveal" style="color:'+c.deep+'"></p>'
    +'<div class="reactions"><button class="rbtn" data-e="😭">😭</button><button class="rbtn" data-e="💀">💀</button><button class="rbtn" data-e="🔥">🔥</button></div>',
    {locked:true});
  s.querySelectorAll('.gbtn').forEach(b=>{
    b.addEventListener('click', ev=>{
      ev.stopPropagation();
      if(s.dataset.ready==='1') return;
      const correct = b.dataset.n === c.n;
      if(correct) guessScore++;
      s.querySelectorAll('.gbtn').forEach(x=>{
        x.disabled = true;
        if(x.dataset.n===c.n) x.classList.add('right');
        else if(x===b) x.classList.add('wrong');
        else x.style.opacity = .45;
      });
      const rv = s.querySelector('.reveal');
      rv.textContent = correct ? c.right : c.wrong;
      rv.classList.add('show');
      s.querySelector('.reactions').classList.add('show');
      s.dataset.ready = '1';
      setTimeout(()=>s.querySelector('.tap-hint').classList.add('show'), 900);
      if(navigator.vibrate) navigator.vibrate(correct?30:[20,40,20]);
    });
  });
  s.querySelectorAll('.rbtn').forEach(b=>{
    b.addEventListener('click', ev=>{
      ev.stopPropagation();
      burst(b, b.dataset.e);
      if(navigator.vibrate) navigator.vibrate(15);
    });
  });
}

guessScene(0);
guessScene(1);

addScene('var(--paper)',
  '<p class="disp" style="font-size:clamp(26px,6.5vw,34px);color:var(--ink)">halftime.</p>'
  +'<p class="sweet" style="font-size:19px;color:var(--ink-soft);margin-top:14px">you\u2019re doing great.<br>it gets worse.</p>',
  {hint:'tap ↓', hintDelay:1200});

guessScene(2);
guessScene(3);

addScene('var(--paper)',
  '<p class="sweet" style="font-size:clamp(24px,6vw,30px);color:var(--ink)">okay wait.<br>one more thing —</p>',
  {hint:'tap ↓', hintDelay:2000});

addScene('var(--rose-paper)',
  '<p class="eyebrow" style="color:var(--rose-deep)">okay, real talk —</p>'
  +'<p class="sweet" style="font-size:clamp(25px,6.2vw,33px);color:var(--rose-deep);max-width:340px;line-height:1.3">You make every room lighter. We\u2019d all be a little lost without you. Happy birthday, <span>'+pretty+'</span>.</p>'
  +'<p style="margin-top:24px;font-family:\'Bricolage Grotesque\',sans-serif;font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--rose-deep);opacity:.8">— from the whole squad</p>',
  {hint:'one more thing ↓', hintDelay:1600, confetti:true});

const vIntro = addScene('var(--marigold-paper)',
  '<p class="eyebrow" style="color:var(--marigold-deep)">now — the verdict 🏆</p>'
  +'<p class="disp" style="font-size:25px;color:var(--marigold-deep);max-width:300px">Rate their roasts.<br>Someone has to win.</p>'
  +'<button class="btn" id="startRate" style="margin-top:24px">let\u2019s judge them →</button>',
  {locked:true});

const rateS = addScene('var(--paper)',
  '<div class="avatar" id="rAv">P</div>'
  +'<p class="rate-who" id="rWho"></p>'
  +'<p class="sweet" id="rQuote" style="font-size:16px;max-width:320px;color:var(--ink-soft);margin-top:10px"></p>'
  +'<div class="stars" id="stars"></div>'
  +'<p class="rating-hint" id="rHint">tap to rate out of 10</p>',
  {locked:true});

const verdictS = addScene('var(--marigold-paper)',
  '<p class="eyebrow" style="color:var(--marigold-deep)">the verdict is in 🏆</p>'
  +'<div class="verdict-list" id="vList"></div>'
  +'<p class="gscore" id="gScore"></p>'
  +'<p class="sweet" id="vQuip" style="font-size:16px;color:var(--marigold-deep);margin-top:14px;max-width:290px"></p>'
  +'<div class="share-row"><button class="btn" id="shareBtn">share the verdict</button><button class="btn ghost" id="againBtn">watch again</button></div>'
  +'<p class="footer-brand">made with mischief · softlaunch*</p>',
  {locked:true, confetti:true});

const dotsEl = document.getElementById('dots');
scenes.forEach(()=>{ const d=document.createElement('div'); d.className='dot'; dotsEl.appendChild(d); });
const dots = [...dotsEl.children];
let idx = 0;

function goTo(i){
  scenes[idx].classList.remove('on');
  idx = i;
  const s = scenes[idx];
  s.classList.add('on');
  stage.style.background = s.dataset.bg;
  dots.forEach((d,j)=>{d.classList.remove('now','done'); if(j<idx)d.classList.add('done'); if(j===idx)d.classList.add('now');});
  if(s.dataset.ready==='1'){
    setTimeout(()=>s.querySelector('.tap-hint').classList.add('show'), +s.dataset.hintdelay);
  }
  if(s.dataset.confetti && !s.dataset.popped){ s.dataset.popped='1'; confetti(); }
}
stage.addEventListener('click', e=>{
  if(e.target.closest('button')) return;
  const s = scenes[idx];
  if(s.dataset.ready!=='1') return;
  if(idx < scenes.length-1 && s!==rateS && s!==verdictS && s!==vIntro) goTo(idx+1);
});
scenes[0].classList.add('on');
stage.style.background = scenes[0].dataset.bg;
dots[0].classList.add('now');
setTimeout(()=>scenes[0].querySelector('.tap-hint').classList.add('show'), 600);

document.getElementById('startRate').addEventListener('click', ()=>{ rateI=0; showRate(); goTo(scenes.indexOf(rateS)); });

let rateI = 0;
const starsEl = document.getElementById('stars');
for(let i=1;i<=10;i++){
  const st = document.createElement('div');
  st.className='star'; st.textContent=i;
  st.addEventListener('click', ev=>{ ev.stopPropagation(); rate(i); });
  starsEl.appendChild(st);
}
function showRate(){
  const c = contribs[rateI];
  const av = document.getElementById('rAv');
  av.textContent = c.k; av.style.background = c.c; av.style.color = 'var(--ink)';
  document.getElementById('rWho').textContent = c.n + '\u2019s roast';
  document.getElementById('rQuote').textContent = '\u201c' + c.line + '\u201d';
  [...starsEl.children].forEach(s=>s.classList.remove('lit'));
  document.getElementById('rHint').textContent = 'tap to rate out of 10';
}
function rate(v){
  [...starsEl.children].forEach((s,i)=>s.classList.toggle('lit', i<v));
  scores[contribs[rateI].n] = v;
  document.getElementById('rHint').textContent = v + '/10 — locked in';
  if(navigator.vibrate) navigator.vibrate(20);
  setTimeout(()=>{
    rateI++;
    if(rateI < contribs.length){ showRate(); }
    else { buildVerdict(); goTo(scenes.indexOf(verdictS)); }
  }, 650);
}
function buildVerdict(){
  const sorted = contribs.map(c=>({...c, s:scores[c.n]||0})).sort((a,b)=>b.s-a.s);
  const list = document.getElementById('vList');
  list.innerHTML = '';
  sorted.forEach((c,i)=>{
    const r = document.createElement('div');
    r.className = 'vrow ' + (i===0?'gold':i===1?'silver':i===2?'bronze':'');
    r.innerHTML = '<div class="rank">'+(i+1)+'</div><div class="who">'+c.n+'</div><div class="sc">'+c.s+'/10</div>';
    list.appendChild(r);
  });
  const gsMsgs = ['0/4?? Do you even know these people?','1/4. Rough. They know YOU better.','2/4. Coin-flip energy.','3/4. You know your people.','4/4. Scary. You know them TOO well.'];
  document.getElementById('gScore').textContent = 'Your guesses: ' + guessScore + '/4 — ' + ['💀','😬','🤨','🫶','🏆'][guessScore];
  const loser = sorted[sorted.length-1];
  document.getElementById('vQuip').textContent = gsMsgs[guessScore] + ' And ' + loser.n + '\u2026 we\u2019re worried about you.';
}
document.getElementById('shareBtn').addEventListener('click', ()=>{
  if(navigator.share){ navigator.share({title:'softlaunch*', text:'my friends made me the best/worst card ever 💀 i guessed '+guessScore+'/4', url:location.href}).catch(()=>{}); }
  else alert('Screenshot the leaderboard. That\u2019s the whole point.');
});
document.getElementById('againBtn').addEventListener('click', ()=>{
  guessScore = 0; Object.keys(scores).forEach(k=>delete scores[k]);
  location.reload();
});

function burst(el, emo){
  const rect = el.getBoundingClientRect();
  const srect = stage.getBoundingClientRect();
  for(let i=0;i<7;i++){
    const f = document.createElement('span');
    f.className = 'femo';
    f.textContent = emo;
    f.style.left = (rect.left - srect.left + rect.width/2 - 11 + (Math.random()*60-30)) + 'px';
    f.style.top = (rect.top - srect.top - 10) + 'px';
    f.style.animationDelay = (Math.random()*.25)+'s';
    stage.appendChild(f);
    setTimeout(()=>f.remove(), 1600);
  }
}
function confetti(){
  const colors = ['#E84D8A','#F2A93B','#5BC49A','#B9A7E6','#F0997B'];
  for(let k=0;k<44;k++){
    const c = document.createElement('div');
    c.className='confetti-piece';
    const sz = 6+Math.random()*7;
    c.style.cssText = 'left:'+(Math.random()*100)+'%;width:'+sz+'px;height:'+(sz*.55)+'px;background:'+colors[k%5]+';animation:fall '+(2.4+Math.random()*2)+'s linear '+(Math.random()*.9)+'s forwards';
    stage.appendChild(c);
    setTimeout(()=>c.remove(), 5500);
  }
}
</script>
</body>
</html>
